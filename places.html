<title>Places</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
    background: black;
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
}

/* TITLE */
.title {
    text-align: center;
    margin: 40px 0;
}

.title h1 {
    font-size: 40px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
    padding: 20px 40px;
}

/* CARD */
.card {
    position: relative;
    overflow: hidden;
    border-radius: 15px;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 280px;
    object-fit: cover;
    transition: 0.5s;
}

/* OVERLAY TEXT */
.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 20px;
    color: white;
    font-size: 22px;
    background: linear-gradient(transparent, black);
}

.card:hover img {
    transform: scale(1.1);
}
</style>

</head>
